name: Release

on:
  push:
    branches:
      - main
      - master
    paths:
      - 'assets/config_template.json'
      - '.github/workflows/release.yml'

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detect and tag new version
        id: check-version
        uses: salsify/action-detect-and-tag-new-version@v2.0.3
        with:
          tag-template: "{VERSION}"
          version-command: |
            bash -o pipefail -c "cat ./assets/config_template.json | jq -r '.version'"

      - name: Get commit history and summarize
        id: generate-changelog
        if: steps.check-version.outputs.tag
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          PREV_TAG: ${{ steps.check-version.outputs.previous-version }}
          NEW_TAG: ${{ steps.check-version.outputs.tag }}
        run: |
          compare_url="https://api.github.com/repos/IAHispano/Applio/compare/${PREV_TAG}...${NEW_TAG}"
          compare_data=$(curl -s "$compare_url" \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github+json")

          files_str=$(echo "$compare_data" | jq -r \
            '.files[]? | "[\(.status | ascii_upcase)] \(.filename | split("/") | last) (+\(.additions) -\(.deletions) lines)"')

          commits_str=$(echo "$compare_data" | jq -r \
            '.commits[]?.commit.message | split("\n")[0] | select(test("merge|chore|format|run black"; "i") | not) | "- \(.)"')

          {
            echo "GLOBAL MODIFIED FILES IN THIS RELEASE:"
            echo "$files_str"
            echo ""
            echo "COMMIT HISTORY:"
            echo "$commits_str"
          } > commits.txt

          SYSTEM_INSTRUCTION="You are an expert release notes generator. You will receive a list of commit messages and a detailed global list of files modified in this release (including their status: ADDED, REMOVED, MODIFIED, and line counts).\nYour task is to extract, group, and present the most relevant changes as a concise bulleted list (maximum 5-7 items).\n\n### CORE RULES:\n1. **Internal File Context:** Use the detailed file list ONLY internally to understand which modules or areas were impacted. If multiple commits seem to touch the same area based on the file names, commit logic, or shared modified files, YOU MUST merge them into a single, cohesive bullet point. Focus on the overall problem solved rather than the individual steps taken.\n2. **Overarching Impact over Micro-Commits:** Do not list every single fix. If a developer made multiple commits addressing the same general area or feature, summarize the final result. Ignore intermediate debugging steps (e.g., if a feature was added and then fixed in a later commit, only list the feature as functional).\n3. **Filter Noise:** Ignore commits related to CI/CD workflows, generic formatting, linter configurations, merges, and generic 'update file' messages without functional context. Explicitly ignore and exclude any mentions or references to 'volume envelope' as they are not relevant.\n4. **Action-Oriented & Brief:** Each item must start with an uppercase verb (Added, Fixed, Improved, Updated, Removed, Optimized). Keep descriptions brief and focused on the feature or user impact.\n5. **Smart Deduplication:** If a commit reverts a previous commit, ignore both. If a commit is just a follow-up fix (e.g., adding a missing import after a main feature commit), combine them into the main feature entry.\n6. **NO FILE NAMES & BANNED WORDS:** NEVER include file names, file paths, or file extensions in the final output. The output must be purely functional and user-facing. NEVER mention, use, or reference the phrase 'volume envelope' in the final output under any circumstances.\n\n### OUTPUT FORMAT:\nReturn ONLY the bulleted list. No introductions, no conclusions, no markdown code blocks, just the raw text list starting with '- '."

          COMMIT_HISTORY=$(cat commits.txt)

          json_payload=$(jq -n \
            --arg input "$COMMIT_HISTORY" \
            --arg sys_inst "$SYSTEM_INSTRUCTION" \
            '{
              model: "gemini-3.6-flash",
              input: $input,
              system_instruction: $sys_inst,
              generation_config: {
                max_output_tokens: 8192,
                thinking_level: "low"
              }
            }')

          gemini_response=$(curl -s "https://generativelanguage.googleapis.com/v1beta/interactions" \
            -X POST \
            -H "Content-Type: application/json" \
            -H "x-goog-api-key: $GEMINI_API_KEY" \
            -d "$json_payload")

          summary=$(echo "$gemini_response" | jq -r \
            '.steps[]? | select(.type == "model_output") | .content[]? | select(.type == "text") | .text')

          if [ -z "$summary" ] || [ "$summary" == "null" ]; then
            echo "::warning::Gemini API call failed or returned empty. Proceeding with empty changelog."
            echo "$gemini_response"
            echo "" > summarized_changelog.txt
          else
            echo "$summary" > summarized_changelog.txt
          fi

      - name: Set up Node.js
        if: steps.check-version.outputs.tag
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install gh-release
        if: steps.check-version.outputs.tag
        run: |
          npm install https://github.com/IAHispano/gh-release.git

      - name: Create package.json
        if: steps.check-version.outputs.tag
        run: |
          cd /home/runner/work/Applio/Applio
          echo '{}' > package.json
          jq \
            --arg version "${{ steps.check-version.outputs.tag }}" \
            --arg url "git+https://github.com/IAHispano/Applio.git" \
            '. + {version: $version, repository: {url: $url}}' \
            package.json > tmp.$$.json && mv tmp.$$.json package.json

      - name: Publish release
        if: steps.check-version.outputs.tag
        run: |
          cd /home/runner/work/Applio/Applio && \
          tag_name="${{ steps.check-version.outputs.tag }}"
          changelog=$(cat summarized_changelog.txt)
          GH_RELEASE_GITHUB_API_TOKEN=${{ secrets.GITHUB_TOKEN }} npx gh-release \
            -t "${tag_name}" \
            -n "Applio ${tag_name}" \
            -c "main" \
            -b "## Important Installation Guidelines

            ### Before You Install Applio
            Please review these essential instructions to ensure a smooth installation:
            - **File Location**: Place the Applio files in a dedicated folder on your C drive.
            - **Access Control**: Avoid placing Applio in folders that require elevated privileges.
            - **Administrator Rights**: Do not run the \`run-install.bat\` script with administrator privileges.
            - **Path Requirements**: Ensure the installation path is free of spaces or special characters.
            - **Security Settings**: Temporarily disable your antivirus and firewall to prevent any issues with missing dependencies during installation.
            ### Installation Steps
            - **Download Compiled Version**: Get the zip from [this link](https://huggingface.co/IAHispano/Applio/resolve/main/Compiled/Windows/ApplioV${{ steps.check-version.outputs.tag }}.zip).
            - **Run Applio**: Extract the \`.zip\` file, then open the \`run-applio.bat\` file.
          ## What's New in This Release
            ${changelog}

          **Full Changelog**: https://github.com/IAHispano/Applio/compare/${{ steps.check-version.outputs.previous-version }}...${{ steps.check-version.outputs.tag }}  " \
            -o "IAHispano" \
            -r "Applio" \
            -w /home/runner/work/Applio/Applio \
            -y
        env:
          GITHUB_TOKEN: "${{ secrets.GITHUB_TOKEN }}"

      - name: Trigger Pre-Compiled
        if: steps.check-version.outputs.tag
        uses: actions/github-script@v6
        with:
          script: |
            await github.rest.actions.createWorkflowDispatch({
            owner: context.repo.owner,
            repo: context.repo.repo,
            workflow_id: 'pre_compiled.yml',
            ref: context.ref,
            });
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
